<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweets by Jhea</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="header">
    <div class="nav">
        <div class="logo">🎂 Jhea</div>

        <div class="hamburger" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>

        <ul id="menu">
            <li><a href="#menu-section">Menu</a></li>
            <li><a href="#gallery">Gallery</a></li>
        </ul>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Fresh Cakes & Brownies 🍰</h1>
    <p>Delicious. Affordable. Made with love 💗</p>
    <button onclick="scrollToMenu()">Order Now</button>
</section>

<!-- MENU -->
<section id="menu-section">
    <h2>Our Products</h2>

    <div class="products">

        <!-- CAKE -->
        <div class="product">
            <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400">

            <h3>Chocolate Cake</h3>

            <div class="sizes">
                <button onclick="addToCart('Cake Small',350)">Small ₱350</button>
                <button onclick="addToCart('Cake Medium',750)">Medium ₱750</button>
                <button onclick="addToCart('Cake Large',1200)">Large ₱1200</button>
            </div>
        </div>

        <!-- BROWNIES -->
        <div class="product">
            <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400">

            <h3>Brownies</h3>

            <div class="sizes">
                <button onclick="addToCart('Brownie 1pc',95)">1pc ₱95</button>
                <button onclick="addToCart('Box of 6',520)">Box ₱520</button>
            </div>
        </div>

    </div>
</section>

<!-- FLOATING CART -->
<div class="floating-cart" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3>Your Order</h3>

        <div id="cartItems"></div>

        <h2>Total: ₱<span id="total">0</span></h2>

        <button onclick="checkout()">Order via SMS</button>
        <button onclick="closeCart()">Close</button>
    </div>
</div>

<!-- TOAST -->
<div id="toast">Added to cart ✅</div>

<script src="script.js"></script>
</body>
</html>
